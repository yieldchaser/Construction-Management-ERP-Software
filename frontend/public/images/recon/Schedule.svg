<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <style>
    /* Clock hand rotation */
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    /* Pulsing "Ghost" tasks to represent empty slots */
    @keyframes pulse-task {
      0%, 100% { opacity: 0.3; transform: scaleX(1); }
      50% { opacity: 0.6; transform: scaleX(1.05); }
    }
    
    .clock-hand { 
      animation: spin 10s linear infinite; 
      transform-origin: 150px 150px; 
    }
    .ghost-task { 
      animation: pulse-task 2s ease-in-out infinite; 
    }
    .ghost-task-delayed { 
      animation: pulse-task 2s ease-in-out infinite 1s; 
    }
  </style>
  <rect x="30" y="40" width="140" height="120" rx="8" fill="#F5F7F8" stroke="#CFD8DC" stroke-width="2"></rect>
  <rect x="30" y="40" width="140" height="25" rx="8" fill="#37474F"></rect>
  <rect x="45" y="48" width="30" height="8" rx="4" fill="#546E7A"></rect>
  <rect class="ghost-task" x="45" y="80" width="80" height="12" rx="6" fill="#FFB300"></rect>
  <rect class="ghost-task-delayed" x="45" y="105" width="50" height="12" rx="6" fill="#B0BEC5"></rect>
  <rect class="ghost-task" x="45" y="130" width="100" height="12" rx="6" fill="#B0BEC5"></rect>
  <circle cx="150" cy="150" r="30" fill="white" stroke="#37474F" stroke-width="4"></circle>
  <line class="clock-hand" x1="150" y1="150" x2="150" y2="132" stroke="#F4511E" stroke-width="3" stroke-linecap="round"></line>
  <line x1="150" y1="150" x2="162" y2="150" stroke="#37474F" stroke-width="3" stroke-linecap="round"></line>
  <circle cx="150" cy="150" r="2" fill="#37474F"></circle>
</svg>
