<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 100 100">
  <defs>
    <style>
      /* Base chart outline for the overall donut */
      .base-ring { fill: #f3f4f6; stroke: #374151; stroke-width: 0.75; }
      
      /* Segment color definitions */
      .segment { stroke: #374151; stroke-width: 0.75; }
      .green-seg { fill: #34d399; }
      .red-seg { fill: #f87171; }
      .yellow-seg { fill: #facc15; }
      
      /* Inner central coin element */
      .coin { fill: #fbbf24; stroke: #374151; stroke-width: 0.75; }
      .coin-symbol { fill: #ffffff; font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }

      /* Base animation for the rotating segments */
      @keyframes popAndRotate {
        0%, 100% {
          transform: rotate(0deg) scale(1);
          filter: drop-shadow(0px 0px 0px rgba(0,0,0,0.1));
        }
        50% {
          transform: rotate(2deg) scale(1.05); /* Slight outward scale and rotate */
          filter: drop-shadow(0px 3px 6px rgba(0,0,0,0.2)); /* Enhance depth */
        }
      }

      /* Apply the looping animation to individual segments with delays */
      .green-seg { animation: popAndRotate 4s infinite ease-in-out; transform-origin: center; }
      .red-seg { animation: popAndRotate 4s infinite ease-in-out; animation-delay: 1.3s; transform-origin: center; }
      .yellow-seg { animation: popAndRotate 4s infinite ease-in-out; animation-delay: 2.6s; transform-origin: center; }
    </style>
  </defs>
  <circle cx="50" cy="50" r="40" class="base-ring"></circle>
  <circle cx="50" cy="50" r="20" fill="white" stroke="#374151" stroke-width="0.75"></circle>
  <path d="M50,10 A40,40 0 0,1 84.6,30 L67.3,40 A20,20 0 0,0 50,30 Z" class="segment green-seg"></path>
  <path d="M22.7,78 A40,40 0 0,1 10,50 L30,50 A20,20 0 0,0 36.3,64 Z" class="segment red-seg"></path>
  <path d="M50,90 A40,40 0 0,1 22.7,78 L36.3,64 A20,20 0 0,0 50,70 Z" class="segment yellow-seg"></path>
  <circle cx="50" cy="50" r="15" class="coin"></circle>
  <text x="50" y="55" text-anchor="middle" class="coin-symbol">$</text>
</svg>
